name: V2 Enterprise Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  v2-ui-tests:
    name: Run V2 UI Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run V2 UI Tests
        run: xvfb-run npm run test:v2:ui
        
      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-ui-reports
          path: |
            reports/
            test-results/

  v2-api-tests:
    name: Run V2 API Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci

      - name: Run V2 API Tests
        run: npm run test:v2:api
        
      - name: Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-api-reports
          path: reports/

  v2-perf-tests:
    name: Run V2 Performance Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci

      - name: Setup k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run V2 Standard Load Test
        run: |
          mkdir -p artifacts
          npm run test:v2:perf:standard
        
      - name: Upload k6 Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-report
          path: artifacts/k6-api-report.html

  publish-reports:
    name: Publish Reports to GitHub Pages
    needs: [v2-ui-tests, v2-api-tests, v2-perf-tests]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download UI Reports
        uses: actions/download-artifact@v4
        with:
          name: v2-ui-reports
          path: public/ui
          
      - name: Download API Reports
        uses: actions/download-artifact@v4
        with:
          name: v2-api-reports
          path: public/api
          
      - name: Download Performance Reports
        uses: actions/download-artifact@v4
        with:
          name: k6-performance-report
          path: public/perf
          
      - name: Generate Unified Dashboard
        run: |
          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>V2 Automation Reports Dashboard</title>
            <style>
              body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 40px; }
              h1 { color: #2c3e50; text-align: center; }
              .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 40px; }
              .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 250px; transition: transform 0.2s; }
              .card:hover { transform: translateY(-5px); }
              .card h2 { margin-top: 0; color: #34495e; }
              .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px; }
              .btn:hover { background-color: #2980b9; }
            </style>
          </head>
          <body>
            <h1>V2 Enterprise Test Automation Dashboard</h1>
            <div class="container">
              <div class="card">
                <h2>UI Tests</h2>
                <p>Playwright + Cucumber-JS</p>
                <a href="ui/reports/index-v2.html" class="btn">View Report</a>
              </div>
              <div class="card">
                <h2>API Tests</h2>
                <p>Playwright + Cucumber-JS</p>
                <a href="api/index-v2.html" class="btn">View Report</a>
              </div>
              <div class="card">
                <h2>Performance Tests</h2>
                <p>k6 Load Profiling</p>
                <a href="perf/k6-api-report.html" class="btn">View Report</a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
